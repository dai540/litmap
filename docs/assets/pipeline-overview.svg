<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7F5EF"/>
      <stop offset="1" stop-color="#EEF5F1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#172029" flood-opacity="0.07"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="8.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0 0L10 5L0 10Z" fill="#0F6C5C"/>
    </marker>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #182128; }
      .subtitle { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #5D6770; }
      .eyebrow { font: 700 12px 'Segoe UI', Arial, sans-serif; fill: #0F6C5C; letter-spacing: 0.08em; }
      .heading { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #182128; }
      .text { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #495760; }
      .code { font: 400 14px Consolas, 'Courier New', monospace; fill: #0F6C5C; }
      .note { font: 600 14px 'Segoe UI', Arial, sans-serif; fill: #0F6C5C; }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>

  <text x="56" y="64" class="title">litmap architecture</text>
  <text x="56" y="92" class="subtitle">Cluster structure is decided in analysis space, then projected into a separate display layer for review.</text>

  <rect x="52" y="132" width="300" height="192" rx="24" fill="#FFFFFF" stroke="#E4E7EA" filter="url(#shadow)"/>
  <text x="84" y="168" class="eyebrow">Source and corpus</text>
  <text x="84" y="204" class="heading">Build one canonical paper table</text>
  <text x="84" y="238" class="text">Ingest records from external sources or local files.</text>
  <text x="84" y="264" class="text">Normalize fields and compose embedding text.</text>
  <text x="84" y="300" class="code">papers.parquet</text>

  <rect x="450" y="132" width="300" height="192" rx="24" fill="#FFFFFF" stroke="#E4E7EA" filter="url(#shadow)"/>
  <text x="482" y="168" class="eyebrow">Analysis space</text>
  <text x="482" y="204" class="heading">Decide cluster membership here</text>
  <text x="482" y="238" class="text">Build embeddings, L2-normalize, reduce for clustering,</text>
  <text x="482" y="262" class="text">then run HDBSCAN to obtain labels and probabilities.</text>
  <text x="482" y="300" class="code">embeddings - PCA - labels.csv</text>

  <rect x="848" y="132" width="300" height="192" rx="24" fill="#FFFFFF" stroke="#E4E7EA" filter="url(#shadow)"/>
  <text x="880" y="168" class="eyebrow">Display and review</text>
  <text x="880" y="204" class="heading">Project for reading and sharing</text>
  <text x="880" y="238" class="text">Create a separate 2D plotting space and export</text>
  <text x="880" y="262" class="text">maps, summary tables, diagnostics, and manifests.</text>
  <text x="880" y="300" class="code">coords_2d.csv - map_interactive.html</text>

  <path d="M352 228H450" stroke="#0F6C5C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>
  <path d="M750 228H848" stroke="#0F6C5C" stroke-width="4" stroke-linecap="round" marker-end="url(#arrow)"/>

  <rect x="386" y="352" width="428" height="38" rx="19" fill="#EAF6F2"/>
  <text x="416" y="376" class="note">Design rule: analysis space defines clusters. Display space only makes them readable.</text>
</svg>
