<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="360" viewBox="0 0 1200 360" fill="none">
  <rect width="1200" height="360" rx="28" fill="#F8FAFC"/>
  <text x="56" y="64" fill="#172029" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="700">litmap architecture</text>
  <text x="56" y="92" fill="#58636D" font-family="Segoe UI, Arial, sans-serif" font-size="15">Minimal flow: define a corpus, decide structure in analysis space, then project for display.</text>
  <rect x="52" y="126" width="300" height="150" rx="22" fill="#FFFFFF" stroke="#DCE4EC"/>
  <text x="84" y="164" fill="#0F6C63" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">SOURCE AND CORPUS</text>
  <text x="84" y="202" fill="#172029" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Build one paper table</text>
  <text x="84" y="236" fill="#495760" font-family="Segoe UI, Arial, sans-serif" font-size="15">Normalize records and prepare text for analysis.</text>
  <rect x="450" y="126" width="300" height="150" rx="22" fill="#FFFFFF" stroke="#DCE4EC"/>
  <text x="482" y="164" fill="#0F6C63" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">ANALYSIS SPACE</text>
  <text x="482" y="202" fill="#172029" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Decide structure here</text>
  <text x="482" y="236" fill="#495760" font-family="Segoe UI, Arial, sans-serif" font-size="15">Embeddings, reduction, and clustering live in this layer.</text>
  <rect x="848" y="126" width="300" height="150" rx="22" fill="#FFFFFF" stroke="#DCE4EC"/>
  <text x="880" y="164" fill="#0F6C63" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700">DISPLAY AND REPORT</text>
  <text x="880" y="202" fill="#172029" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="700">Project and communicate</text>
  <text x="880" y="236" fill="#495760" font-family="Segoe UI, Arial, sans-serif" font-size="15">Create a readable map and preserve lightweight outputs.</text>
  <path d="M352 200H450" stroke="#0F6C63" stroke-width="4" stroke-linecap="round"/>
  <path d="M750 200H848" stroke="#0F6C63" stroke-width="4" stroke-linecap="round"/>
</svg>
