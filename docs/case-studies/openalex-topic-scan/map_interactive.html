<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenAlex Topic Scan</title>
  <style>
    body { margin: 0; font-family: Georgia, serif; background: #f6f2ea; color: #172029; }
    main { max-width: 980px; margin: 0 auto; padding: 32px 20px 56px; }
    .shell { background: #fff; border: 1px solid #d8ddd8; border-radius: 18px; padding: 24px; }
    img { width: 100%; border-radius: 16px; border: 1px solid #dde2dd; }
    table { width: 100%; border-collapse: collapse; margin-top: 18px; }
    th, td { text-align: left; padding: 10px 12px; border-bottom: 1px solid #e5e7e3; }
  </style>
</head>
<body>
  <main>
    <div class="shell">
      <h1>OpenAlex Topic Scan</h1>
      <p>Interactive report preview generated from the bundled tutorial corpus.</p>
      <img src="../../assets/openalex-topic-scan.svg" alt="OpenAlex Topic Scan map">
      <table>
        <thead><tr><th>Cluster</th><th>Theme</th><th>Size</th><th>Mean probability</th></tr></thead>
        <tbody><tr><td>0</td><td>perturbation, immune, signaling</td><td>3</td><td>0.83</td></tr><tr><td>1</td><td>integration, batch, annotation</td><td>3</td><td>0.84</td></tr><tr><td>2</td><td>lineage, perturb seq, recording</td><td>3</td><td>0.81</td></tr><tr><td>3</td><td>portals, repository, editorial</td><td>3</td><td>0.82</td></tr></tbody>
      </table>
    </div>
  </main>
</body>
</html>
