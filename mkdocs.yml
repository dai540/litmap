site_name: litmap
site_description: Reproducible literature mapping in Python.
theme:
  name: material
  language: en
  features:
    - navigation.sections
    - navigation.tabs
    - navigation.top
    - content.code.copy
    - content.action.edit
  palette:
    - scheme: default
      primary: teal
      accent: deep orange
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - tables
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Design: design.md
  - API Surface: api.md
  - Tutorials:
      - Overview: tutorials/index.md
      - Cancer Immunotherapy: tutorials/cancer-immunotherapy.md
      - Antibody-Drug Conjugates: tutorials/adc-landscape.md
      - PROTAC: tutorials/protac-landscape.md
      - Breast Cancer: tutorials/breast-cancer.md
      - Lung Cancer: tutorials/lung-cancer.md
